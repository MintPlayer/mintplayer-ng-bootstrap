server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # SPA fallback — any unmatched route serves index.html so Vue Router
    # can handle the path on the client.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Long-cache hashed assets (Vite emits filenames with content hashes).
    location ~* \.(?:js|mjs|css|woff2?|svg|png|jpg|jpeg|gif|webp|ico)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Never cache index.html
    location = /index.html {
        add_header Cache-Control "no-store";
    }
}
