<h1 class="text-center">For directive</h1>

<p>
    The <code>[bsFor]</code> directive links a <code>&lt;label&gt;</code> to its
    associated input via a template reference, so clicks on the label focus the
    target control without needing a hand-maintained <code>for</code>/<code>id</code> pair.
</p>

<h2>Basic usage</h2>

<bs-code-snippet [codeToCopy]="snippetBasicHtml" [language]="'html'"></bs-code-snippet>
<bs-code-snippet [codeToCopy]="snippetBasicTs" [language]="'ts'"></bs-code-snippet>

<h2>Demo</h2>
<bs-form>
    <bs-grid>
        <div bsRow class="mb-3">
            <label [md]="4" bsColFormLabel [bsFor]="firstName">First name</label>
            <div [md]="8">
                <input type="text" #firstName>
            </div>
        </div>
        <div bsRow class="mb-3">
            <label [md]="4" bsColFormLabel [bsFor]="lastName">Last name</label>
            <div [md]="8">
                <input type="text" #lastName>
            </div>
        </div>
        <div bsRow class="mb-3">
            <label [md]="4" bsColFormLabel [bsFor]="birthDate">Birth date</label>
            <div [md]="8">
                <input type="date" #birthDate>
            </div>
        </div>
    </bs-grid>
</bs-form>
