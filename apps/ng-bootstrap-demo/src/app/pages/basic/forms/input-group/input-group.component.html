<h1 class="text-center">Input group</h1>

<p>
  <code>bs-input-group</code> bundles an input together with prefix or suffix
  add-ons (buttons, plain text, other inputs). Slot the controls in their visual
  order; the group handles the rounded-corner pairing and visual alignment.
</p>

<h2>Basic usage</h2>

<bs-code-snippet [codeToCopy]="snippetBasicHtml" [language]="'html'"></bs-code-snippet>
<bs-code-snippet [codeToCopy]="snippetBasicTs" [language]="'ts'"></bs-code-snippet>

<h2>Demo</h2>
<bs-form>
    <bs-input-group>
        <button [color]="colors.secondary">Info</button>
        <input type="text">
        <button type="submit" [color]="colors.primary">Submit</button>
    </bs-input-group>
</bs-form>
