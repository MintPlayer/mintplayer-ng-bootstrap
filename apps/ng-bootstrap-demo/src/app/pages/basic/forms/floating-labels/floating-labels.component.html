<h1 class="text-center">Floating labels</h1>

<p>
  <code>bs-floating-label</code> wraps a single form control plus a
  <code>&lt;label&gt;</code>, animating the label into the field when the control
  is empty and lifting it on focus or when a value is present. The wrapper
  expects exactly one input-like control next to its label.
</p>

<h2>Basic usage</h2>

<bs-form>
    <bs-floating-label class="d-block mb-3">
        <input type="email" placeholder="name@example.com">
        <label>Email address</label>
    </bs-floating-label>
    <bs-floating-label class="d-block">
        <input type="password" placeholder="Password">
        <label>Password</label>
    </bs-floating-label>
</bs-form>
