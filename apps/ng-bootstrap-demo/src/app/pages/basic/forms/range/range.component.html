<h1 class="text-center">Range</h1>

<p>
  <code>bs-range</code> is a slider input bound through
  <code>[(ngModel)]</code> (or any reactive-forms control). Use
  <code>[min]</code>, <code>[max]</code>, and <code>[step]</code> to constrain
  the value, and <code>[disabled]</code> to lock the control.
</p>

<h2>Basic usage</h2>

<bs-grid>
    <div bsRow>
        <div [md]="11">
            <bs-range [min]="0" [max]="5" [step]="0.5" [(ngModel)]="rangeValue" [disabled]="isDisabled()"></bs-range>
        </div>
        <div [md]="1">
            <span>{{ rangeValue() }}</span>
        </div>
    </div>
    <div bsRow>
        <div [md]="11">
            <bs-range [min]="0" [max]="5" [step]="0.5" [(ngModel)]="rangeValue" [disabled]="isDisabled()"></bs-range>
        </div>
        <div [md]="1">
            <span>{{ rangeValue() }}</span>
        </div>
    </div>
    <div bsRow>
        <div [col] class="text-center">
            <bs-checkbox [(ngModel)]="isDisabled" [type]="'checkbox'">Disabled</bs-checkbox>
        </div>
    </div>
</bs-grid>
