<h1 class="text-center">Rating</h1>

<p>
    A star-rating widget with two-way binding via <code>[(value)]</code> and
    a configurable <code>[maximum]</code>. Emits hover-preview updates via
    <code>(starsChange)</code>.
</p>

<h2>Basic usage</h2>

<bs-grid>
    <div bsRow>
        <div [md]="12">
            <bs-rating [maximum]="10" [(value)]="ratingValue" (starsChange)="previewValue.set($event)"></bs-rating>
            <span>{{ previewValue() }}</span>
        </div>
    </div>
</bs-grid>
