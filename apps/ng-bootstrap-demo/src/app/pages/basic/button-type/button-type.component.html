<h1 class="text-center">Button type</h1>

<p>
  <code>BsButtonTypeDirective</code> applies a Bootstrap colour theme to any
  native <code>&lt;button&gt;</code> via the <code>[color]</code> input — no
  wrapper component required.
</p>

<h2>Basic usage</h2>

<bs-code-snippet [codeToCopy]="snippetBasicHtml" [language]="'html'"></bs-code-snippet>
<bs-code-snippet [codeToCopy]="snippetBasicTs" [language]="'ts'"></bs-code-snippet>

<h2>Demo</h2>
@for (color of colorValues; track color.key) {
    <button [color]="color.value" class="mx-2">{{ color.key }}</button>
}
