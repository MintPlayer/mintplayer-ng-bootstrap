<h1 class="text-center">Timepicker</h1>

<p>
    Pick a time of day. Two-way bind the current <code>Date</code> via
    <code>[(selectedTime)]</code>; only the hour/minute components are
    relevant to the picker.
</p>

<h2>Basic usage</h2>

<bs-code-snippet [codeToCopy]="snippetBasicHtml" [language]="'html'"></bs-code-snippet>
<bs-code-snippet [codeToCopy]="snippetBasicTs" [language]="'ts'"></bs-code-snippet>

<h2>Demo</h2>
<bs-grid>
    <div bsRow class="mb-3">
        <div [md]="6">
            <bs-timepicker [(selectedTime)]="selectedTime"></bs-timepicker>
        </div>
        <div [md]="6">
            <bs-timepicker [(selectedTime)]="selectedTime"></bs-timepicker>
        </div>
    </div>
    <div bsRow class="mb-3">
        <div [md]="6">
            Selected time
        </div>
        <div [md]="6">
            <span class="px-3">{{ selectedTime() | date: 'HH:mm' }}</span>
        </div>
    </div>
</bs-grid>
<bs-form>
    <input type="text">
</bs-form>
