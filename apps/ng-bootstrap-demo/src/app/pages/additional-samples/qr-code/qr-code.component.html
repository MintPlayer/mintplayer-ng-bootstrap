<h1 class="text-center">QR Code viewer</h1>

<p>
  <code>&lt;qr-code&gt;</code> from <code>&#64;mintplayer/ng-qr-code</code> renders a QR
  representation of any string passed to its <code>[value]</code> input. The component
  re-renders whenever the input changes, so binding it to a signal or
  <code>ngModel</code>-driven field produces a live preview.
</p>

<h2>Basic usage</h2>

<bs-form>
    <bs-grid>
        <div bsRow>
            <div [xl]="6">
                <textarea [(ngModel)]="text" class="mb-3"></textarea>
            </div>
            <div [xl]="6" class="text-center">
                <qr-code [value]="text()"></qr-code>
            </div>
        </div>
    </bs-grid>
</bs-form>
