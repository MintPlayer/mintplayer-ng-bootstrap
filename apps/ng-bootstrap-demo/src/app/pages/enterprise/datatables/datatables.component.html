<h1 class="text-center flex-shrink-0">Datatable</h1>

<bs-select [ngModel]="mode()" (ngModelChange)="mode.set($event)" class="mb-3 flex-shrink-0">
  <option value="pagination">Pagination</option>
  <option value="virtualScroll">Virtual scrolling</option>
</bs-select>

<bs-datatable class="flex-grow-1"
  [virtualScroll]="virtualScroll()"
  [itemSize]="40"
  [isResponsive]="virtualScroll()"
  [fetch]="fetchArtists"
  [(settings)]="settings"
  selectionMode="multiple"
  [rowKey]="rowKey"
  [(selection)]="selection">

  <div *bsDatatableColumn="'Name'; sortable: true">Artist</div>
  <div *bsDatatableColumn="'YearStarted'; sortable: true">Year started</div>
  <div *bsDatatableColumn="'YearQuit'; sortable: true">Year quit</div>

  <ng-container *bsRowTemplate="let artist">
    <td class="text-nowrap">{{ $any(artist)?.name }}</td>
    <td class="text-nowrap">{{ $any(artist)?.yearStarted }}</td>
    <td class="text-nowrap">{{ $any(artist)?.yearQuit }}</td>
  </ng-container>
</bs-datatable>

@if (selection().length) {
  <small class="text-muted">Selected {{ selection().length }} artist(s).</small>
}
