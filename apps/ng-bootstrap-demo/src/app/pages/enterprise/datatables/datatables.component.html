<h1 class="text-center flex-shrink-0">Datatable</h1>

<p>
  Property-driven columns, multi-column sort (shift+click), checkbox selection,
  resizable column widths.
  Pagination is handled server-side via the <code>[fetch]</code> callback.
</p>

<bs-datatable class="flex-grow-1"
  [columns]="columns()"
  [fetch]="fetchArtists"
  [(settings)]="settings"
  selectionMode="multiple"
  [rowKey]="rowKey"
  [(selection)]="selection">
</bs-datatable>

@if (selection().length) {
  <small class="text-muted">Selected {{ selection().length }} artist(s).</small>
}
