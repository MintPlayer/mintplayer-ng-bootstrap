<h1 class="text-center flex-shrink-0">Datatable</h1>

<bs-select [ngModel]="mode()" (ngModelChange)="mode.set($event)" class="mb-3 flex-shrink-0">
  <option value="pagination">Pagination</option>
  <option value="virtualScroll">Virtual scrolling</option>
</bs-select>

<bs-datatable class="flex-grow-1"
  [virtualScroll]="virtualScroll()"
  [itemSize]="40"
  [isResponsive]="virtualScroll()"
  [fetch]="fetchArtists"
  [(settings)]="settings"
  [selectable]="'multiple'"
  [compareWith]="compareArtists"
  [(selection)]="selection">

  <ng-template bsDatatableColumn name="Name">Artist</ng-template>
  <ng-template bsDatatableColumn name="YearStarted">Year started</ng-template>
  <ng-template bsDatatableColumn name="YearQuit">Year quit</ng-template>

  <ng-template bsRowTemplate let-artist>
    <td class="text-nowrap">{{ artist?.name }}</td>
    <td class="text-nowrap">{{ artist?.yearStarted }}</td>
    <td class="text-nowrap">{{ artist?.yearQuit }}</td>
  </ng-template>
</bs-datatable>

@if (selection().length) {
  <small class="text-muted">Selected {{ selection().length }} artist(s).</small>
}
