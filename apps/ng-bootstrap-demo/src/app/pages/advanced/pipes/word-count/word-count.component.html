<h1 class="text-center">Word-count</h1>

<p>
    The <code>bsWordCount</code> pipe returns the number of whitespace-separated
    words in a string.
</p>

<h2>Basic usage</h2>

<bs-form>
    <textarea rows="8" [(ngModel)]="text"></textarea>
</bs-form>
<span>{{ text | bsWordCount }}</span>
