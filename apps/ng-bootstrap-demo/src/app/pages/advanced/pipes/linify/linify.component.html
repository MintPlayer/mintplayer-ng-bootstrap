<h1 class="text-center">Linify</h1>

<p>
    The <code>bsLinify</code> pipe splits a string into an array of lines on
    newline boundaries. The optional argument removes empty entries.
</p>

<h2>Basic usage</h2>

<bs-form>
    <bs-grid>
        <div bsRow>
            <div [md]="6">
                <textarea [(ngModel)]="text" rows="10"></textarea>
                <br>
                <bs-checkbox [type]="'checkbox'" [(ngModel)]="removeEmptyEntries">Remove empty entries</bs-checkbox>
            </div>
            <div [md]="6">
                <bs-list-group>
                    @for (line of (text | bsLinify: removeEmptyEntries); track $index) {
                        <bs-list-group-item>{{ line }}</bs-list-group-item>
                    }
                </bs-list-group>
            </div>
        </div>
    </bs-grid>
</bs-form>

<bs-code-snippet [codeToCopy]="snippetBasicHtml" [language]="'html'"></bs-code-snippet>
<bs-code-snippet [codeToCopy]="snippetBasicTs" [language]="'ts'"></bs-code-snippet>
