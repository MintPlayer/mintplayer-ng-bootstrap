<h1 class="text-center">Trust-html</h1>

<p>
    The <code>bsTrustHtml</code> pipe marks a string as trusted HTML so Angular
    will render it via <code>[innerHTML]</code> without sanitization stripping
    out the markup. Only use on content you control.
</p>

<h2>Basic usage</h2>

<bs-code-snippet [codeToCopy]="snippetBasicHtml" [language]="'html'"></bs-code-snippet>
<bs-code-snippet [codeToCopy]="snippetBasicTs" [language]="'ts'"></bs-code-snippet>

<bs-form>
    <bs-grid>
        <div bsRow>
            <div [md]="6">
                <textarea [(ngModel)]="html" rows="8"></textarea>
            </div>
            <div [md]="6">
                <span [innerHTML]="html | bsTrustHtml"></span>
            </div>
        </div>
    </bs-grid>
</bs-form>
