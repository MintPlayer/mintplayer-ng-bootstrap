<h1 class="text-center">File upload</h1>

<p>
    <code>bs-file-upload</code> exposes a drop zone plus a click-to-browse trigger and renders each pending file
    through the <code>*bsFileUploadTemplate</code> directive. Combine with <code>bsFormatBytes</code> for human-readable sizes.
</p>

<h2>Basic usage</h2>

<bs-grid>
    <div bsRow>
        <div [md]="12" class="text-center">
            <bs-file-upload (filesDropped)="logFilesForUpload($event)">
                <div *bsFileUploadTemplate="let upload of files()" class="d-flex flex-row mx-auto">
                    <div class="file-img"></div>
                    <div class="flex-grow-1 text-start px-2">
                        <span class="d-block text-truncate text-secondary">{{ upload.file.name }}</span>
                        <span class="d-block text-grey mb-0">{{ upload.file.size | bsFormatBytes }}</span>
                        <bs-progress [height]="4">
                            <bs-progress-bar [minimum]="0" [maximum]="upload.file.size" [value]="upload.progress" [color]="colors.danger"></bs-progress-bar>
                        </bs-progress>
                    </div>
                    <button class="btn file-remove" (click)="removeFile(upload)">Remove</button>
                </div>
            </bs-file-upload>
        </div>
    </div>
</bs-grid>

<bs-code-snippet [codeToCopy]="snippetBasicHtml" [language]="'html'"></bs-code-snippet>
<bs-code-snippet [codeToCopy]="snippetBasicTs" [language]="'ts'"></bs-code-snippet>
