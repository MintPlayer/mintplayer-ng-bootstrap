<bs-modal [(isOpen)]="isOpen">
  <div *bsModal>
    <div bsModalHeader>
      <h5 class="modal-title">{{ title() }}</h5>
    </div>
    <div bsModalBody>
      {{ message() }}
    </div>
    <div bsModalFooter>
      <button type="button" class="btn btn-light bg-transparent" bsModalClose (click)="onChoice(false)">Cancel</button>
      <button type="button" class="btn btn-primary" bsModalClose (click)="onChoice(true)">OK</button>
    </div>
  </div>
</bs-modal>
