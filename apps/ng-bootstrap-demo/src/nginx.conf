server {
  listen 80;
  sendfile on;
  default_type application/octet-stream;

  # Keep `Location:` headers relative so the trailing-slash redirect for
  # the SSG'd route directories preserves both host and port. Without
  # this, `/basic/datepicker` → `Location: http://localhost/basic/datepicker/`
  # (port stripped), which breaks deep links on any non-:80 deploy.
  absolute_redirect off;

  gzip on;
  gzip_http_version 1.1;
  gzip_disable      "MSIE [1-6]\.";
  gzip_min_length   256;
  gzip_vary         on;
  gzip_proxied      expired no-cache no-store private auth;
  gzip_types        text/plain text/css application/json application/javascript application/x-javascript text/xml application/xml application/xml+rss text/javascript;
  gzip_comp_level   9;

  root /usr/share/nginx/html;

  location / {
    try_files $uri $uri/ /index.html =404;
  }
}