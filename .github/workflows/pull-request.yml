name: pull-request

on:
  pull_request:
    branches: [ master ]

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

# Self-hosted Nx remote cache. RW token is only used on push to the default
# branch; everything else (PRs, feature branches) gets the read-only token.
env:
  NX_SELF_HOSTED_REMOTE_CACHE_SERVER: ${{ secrets.NX_CACHE_SERVER }}
  NX_SELF_HOSTED_REMOTE_CACHE_ACCESS_TOKEN: ${{ (github.event_name == 'push' && github.ref_name == github.event.repository.default_branch) && secrets.NX_CACHE_RW_TOKEN || secrets.NX_CACHE_RO_TOKEN }}

jobs:
  build:

    name: build
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
        # Required so the Playwright visual-regression baselines (stored in
        # Git LFS via `.gitattributes`) come down as real PNGs instead of
        # pointer files. Without this the snapshot comparison receives a
        # ~130-byte text file and either crashes or fails noisily.
        lfs: true

    - name: Setup node
      uses: actions/setup-node@v4
      with:
        node-version: 22

    - name: Setup .NET 10
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'

    - name: Install dependencies
      run: npm ci

    - name: Install Playwright browsers
      run: npx playwright install --with-deps chromium firefox

    - name: Build
      timeout-minutes: 15
      run: npx nx build --configuration=production

    - name: Unit tests
      timeout-minutes: 15
      run: npx nx affected --target=test --parallel=2 --output-style=stream --base=${{ github.event.pull_request.base.sha }} --head=${{ github.event.pull_request.head.sha }}

    - name: Test API (xUnit)
      timeout-minutes: 10
      run: dotnet test apps/api/Tests/Api.Tests.csproj -c Debug

    - name: E2E tests
      timeout-minutes: 30
      run: npx nx affected --target=e2e --parallel=1 --output-style=stream --base=${{ github.event.pull_request.base.sha }} --head=${{ github.event.pull_request.head.sha }}

    # Live-API contract smoke. Boots `dotnet run` + `ng serve` and runs the
    # query-builder specs unmocked against the real .NET backend.
    - name: E2E (live API)
      timeout-minutes: 15
      run: npx nx run ng-bootstrap-demo-e2e:e2e-live --output-style=stream

    # Hand dist/ off to the dry-run-publish matrix job. Snippets publishes
    # from libs/ (source); the matrix job checks the repo out so we don't
    # need to bundle it into this artifact.
    - name: Upload dist artifact
      uses: actions/upload-artifact@v4
      with:
        name: dist
        path: dist/
        retention-days: 1

  dry-run-publish:
    name: dry-run-publish (${{ matrix.pkg.name }})
    needs: build
    runs-on: ubuntu-latest

    permissions:
      contents: read

    strategy:
      fail-fast: false
      matrix:
        pkg:
          - { name: web-components,        path: dist/libs/mintplayer-web-components/package.json }
          - { name: ng-animations,         path: dist/libs/mintplayer-ng-animations/package.json }
          - { name: ng-click-outside,      path: dist/libs/mintplayer-ng-click-outside/package.json }
          - { name: ng-focus-on-load,      path: dist/libs/mintplayer-ng-focus-on-load/package.json }
          - { name: encode-utf8,           path: dist/libs/mintplayer-encode-utf8/package.json }
          - { name: dijkstra,              path: dist/libs/mintplayer-dijkstra/package.json }
          - { name: qr-code,               path: dist/libs/mintplayer-qr-code/package.json }
          - { name: pagination,            path: dist/libs/mintplayer-pagination/package.json }
          - { name: ng-qr-code,            path: dist/libs/mintplayer-ng-qr-code/package.json }
          - { name: ng-swiper,             path: dist/libs/mintplayer-ng-swiper/package.json }
          - { name: react-bootstrap,       path: dist/libs/mintplayer-react-bootstrap/package.json }
          - { name: vue-bootstrap,         path: dist/libs/mintplayer-vue-bootstrap/package.json }
          - { name: ng-bootstrap,          path: dist/libs/mintplayer-ng-bootstrap/package.json }
          - { name: ng-bootstrap-snippets, path: libs/mintplayer-ng-bootstrap-snippets/package.json }

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download dist artifact
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist

      # Dry-run mode skips provenance attestation (no id-token: write needed).
      - name: Dry-run publish
        uses: ./.github/actions/publish-npm-package
        with:
          package: ${{ matrix.pkg.path }}
          registry: 'https://registry.npmjs.org'
          token: ${{ secrets.PUBLISH_TO_NPMJS }}
          provenance: false
          dry-run: true
