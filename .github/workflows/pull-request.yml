name: pull-request

on:
  pull_request:
    branches: [ master ]

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

# Self-hosted Nx remote cache. RW token is only used on push to the default
# branch; everything else (PRs, feature branches) gets the read-only token.
env:
  NX_SELF_HOSTED_REMOTE_CACHE_SERVER: ${{ secrets.NX_CACHE_SERVER }}
  NX_SELF_HOSTED_REMOTE_CACHE_ACCESS_TOKEN: ${{ (github.event_name == 'push' && github.ref_name == github.event.repository.default_branch) && secrets.NX_CACHE_RW_TOKEN || secrets.NX_CACHE_RO_TOKEN }}

jobs:
  build:
  
    name: pull-request
    runs-on: ubuntu-latest
    
    permissions: 
      contents: read
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
    
    - name: Setup node
      uses: actions/setup-node@v4
      with:
        node-version: 22

    # - name: Print GitHub
    #   run: echo $JSON
    #   env:
    #     JSON: ${{ toJson(github) }}

    - name: Install dependencies
      run: npm ci
    
    - name: Build
      timeout-minutes: 15
      run: npx nx build --configuration=production

    - name: Test
      run: npx nx affected --target=test --watch=false --parallel=true --base=${{ github.event.pull_request.base.sha }} --head=${{ github.event.pull_request.head.sha }}

    ## Dry-run publish to verify package.json files exist in dist
    - name: Dry-run publish ng-animations
      uses: JS-DevTools/npm-publish@v3
      with:
        package: 'dist/libs/mintplayer-ng-animations/package.json'
        token: ${{ secrets.PUBLISH_TO_NPMJS }}
        dry-run: true

    - name: Dry-run publish ng-click-outside
      uses: JS-DevTools/npm-publish@v3
      with:
        package: 'dist/libs/mintplayer-ng-click-outside/package.json'
        token: ${{ secrets.PUBLISH_TO_NPMJS }}
        dry-run: true

    - name: Dry-run publish ng-focus-on-load
      uses: JS-DevTools/npm-publish@v3
      with:
        package: 'dist/libs/mintplayer-ng-focus-on-load/package.json'
        token: ${{ secrets.PUBLISH_TO_NPMJS }}
        dry-run: true

    - name: Dry-run publish encode-utf8
      uses: JS-DevTools/npm-publish@v3
      with:
        package: 'dist/libs/mintplayer-encode-utf8/package.json'
        token: ${{ secrets.PUBLISH_TO_NPMJS }}
        dry-run: true

    - name: Dry-run publish dijkstra
      uses: JS-DevTools/npm-publish@v3
      with:
        package: 'dist/libs/mintplayer-dijkstra/package.json'
        token: ${{ secrets.PUBLISH_TO_NPMJS }}
        dry-run: true

    - name: Dry-run publish qr-code
      uses: JS-DevTools/npm-publish@v3
      with:
        package: 'dist/libs/mintplayer-qr-code/package.json'
        token: ${{ secrets.PUBLISH_TO_NPMJS }}
        dry-run: true

    - name: Dry-run publish pagination
      uses: JS-DevTools/npm-publish@v3
      with:
        package: 'dist/libs/mintplayer-pagination/package.json'
        token: ${{ secrets.PUBLISH_TO_NPMJS }}
        dry-run: true

    - name: Dry-run publish ng-qr-code
      uses: JS-DevTools/npm-publish@v3
      with:
        package: 'dist/libs/mintplayer-ng-qr-code/package.json'
        token: ${{ secrets.PUBLISH_TO_NPMJS }}
        dry-run: true

    - name: Dry-run publish ng-swiper
      uses: JS-DevTools/npm-publish@v3
      with:
        package: 'dist/libs/mintplayer-ng-swiper/package.json'
        token: ${{ secrets.PUBLISH_TO_NPMJS }}
        dry-run: true

    - name: Dry-run publish scheduler-core
      uses: JS-DevTools/npm-publish@v3
      with:
        package: 'dist/libs/mp-scheduler-core/package.json'
        token: ${{ secrets.PUBLISH_TO_NPMJS }}
        dry-run: true

    - name: Dry-run publish scheduler-wc
      uses: JS-DevTools/npm-publish@v3
      with:
        package: 'dist/libs/mp-scheduler-wc/package.json'
        token: ${{ secrets.PUBLISH_TO_NPMJS }}
        dry-run: true

    - name: Dry-run publish splitter-wc
      uses: JS-DevTools/npm-publish@v3
      with:
        package: 'dist/libs/mp-splitter-wc/package.json'
        token: ${{ secrets.PUBLISH_TO_NPMJS }}
        dry-run: true

    - name: Dry-run publish ng-bootstrap
      uses: JS-DevTools/npm-publish@v3
      with:
        package: 'dist/libs/mintplayer-ng-bootstrap/package.json'
        token: ${{ secrets.PUBLISH_TO_NPMJS }}
        dry-run: true