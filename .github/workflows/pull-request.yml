name: pull-request

on:
  pull_request:
    branches: [ master ]

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

# Self-hosted Nx remote cache. RW token is only used on push to the default
# branch; everything else (PRs, feature branches) gets the read-only token.
env:
  NX_SELF_HOSTED_REMOTE_CACHE_SERVER: ${{ secrets.NX_CACHE_SERVER }}
  NX_SELF_HOSTED_REMOTE_CACHE_ACCESS_TOKEN: ${{ (github.event_name == 'push' && github.ref_name == github.event.repository.default_branch) && secrets.NX_CACHE_RW_TOKEN || secrets.NX_CACHE_RO_TOKEN }}

jobs:
  build:

    name: build
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
        # Required so the Playwright visual-regression baselines (stored in
        # Git LFS via `.gitattributes`) come down as real PNGs instead of
        # pointer files. Without this the snapshot comparison receives a
        # ~130-byte text file and either crashes or fails noisily.
        lfs: true

    - name: Setup node
      uses: actions/setup-node@v4
      with:
        node-version: 22

    - name: Setup .NET 10
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'

    - name: Install dependencies
      run: npm ci

    - name: Install Playwright browsers
      run: npx playwright install --with-deps chromium firefox

    - name: Build
      timeout-minutes: 15
      run: npx nx build --configuration=production

    - name: Unit tests
      timeout-minutes: 15
      run: npx nx affected --target=test --parallel=2 --output-style=stream --base=${{ github.event.pull_request.base.sha }} --head=${{ github.event.pull_request.head.sha }}

    - name: Test API (xUnit)
      timeout-minutes: 10
      run: dotnet test apps/api/Tests/Api.Tests.csproj -c Debug

    - name: E2E tests
      timeout-minutes: 30
      run: npx nx affected --target=e2e --parallel=1 --output-style=stream --base=${{ github.event.pull_request.base.sha }} --head=${{ github.event.pull_request.head.sha }}

    # Live-API contract smoke. Boots `dotnet run` + `ng serve` and runs the
    # query-builder specs unmocked against the real .NET backend.
    - name: E2E (live API)
      timeout-minutes: 15
      run: npx nx run ng-bootstrap-demo-e2e:e2e-live --output-style=stream

    # Hand dist/ off to the dry-run-publish matrix job. Snippets publishes
    # from libs/ (source); the matrix job checks the repo out so we don't
    # need to bundle it into this artifact.
    - name: Upload dist artifact
      uses: actions/upload-artifact@v4
      with:
        name: dist
        path: dist/
        retention-days: 1

  # Single dry-run sweep covering both folder roots (dist/libs + the
  # snippets source dir). The action handles discovery, topo-sort and
  # the per-package npm publish --dry-run internally; no need for a
  # 14-entry matrix here.
  dry-run-publish-libs:
    name: dry-run-publish-libs
    needs: build
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download dist artifact
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist

      - name: Dry-run publish (dist/libs)
        uses: MintPlayer/github-actions/publish-npm-packages@b08fbddf0b285a8633ac138b89d79ceb8cc8c888
        with:
          folder: dist/libs
          dry-run: true
          registries: |
            [
              { "url": "https://registry.npmjs.org", "token": "${{ secrets.PUBLISH_TO_NPMJS }}", "provenance": false }
            ]

      - name: Dry-run publish (snippets source)
        uses: MintPlayer/github-actions/publish-npm-packages@b08fbddf0b285a8633ac138b89d79ceb8cc8c888
        with:
          folder: libs/mintplayer-ng-bootstrap-snippets
          dry-run: true
          registries: |
            [
              { "url": "https://registry.npmjs.org", "token": "${{ secrets.PUBLISH_TO_NPMJS }}", "provenance": false }
            ]
