name: publish-master

on:
  push:
    branches: [ master ]

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

# Self-hosted Nx remote cache. RW token is only used on push to the default
# branch; everything else (PRs, feature branches) gets the read-only token.
env:
  NX_SELF_HOSTED_REMOTE_CACHE_SERVER: ${{ secrets.NX_CACHE_SERVER }}
  NX_SELF_HOSTED_REMOTE_CACHE_ACCESS_TOKEN: ${{ (github.event_name == 'push' && github.ref_name == github.event.repository.default_branch) && secrets.NX_CACHE_RW_TOKEN || secrets.NX_CACHE_RO_TOKEN }}

jobs:
  build:
  
    name: publish-master
    runs-on: ubuntu-latest
    
    permissions: 
      contents: read
      id-token: write
      packages: write
      attestations: write
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4
    
    - name: Setup node
      uses: actions/setup-node@v4
      with:
        node-version: 22

    # - name: Print GitHub
    #   run: echo $JSON
    #   env:
    #     JSON: ${{ toJson(github) }}

    - name: Install dependencies
      run: npm ci
    
    - name: Build
      timeout-minutes: 15
      run: npx nx build --configuration=production

    - name: Test
      run: npx nx affected --target=test --watch=false --parallel=true

    ## ng-animations
    - name: Push to NPM
      uses: JS-DevTools/npm-publish@v4
      with:
        package: 'dist/libs/mintplayer-ng-animations/package.json'
        registry: 'https://registry.npmjs.org'
        token: ${{ secrets.PUBLISH_TO_NPMJS }}
        access: 'public'
        provenance: true

    - name: Push to Github
      uses: JS-DevTools/npm-publish@v4
      with:
        package: 'dist/libs/mintplayer-ng-animations/package.json'
        registry: 'https://npm.pkg.github.com'
        token: ${{ github.token }}
        access: 'public'
        provenance: true

    ## ng-click-outside
