name: publish-master

on:
  push:
    branches: [ master ]

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

# Self-hosted Nx remote cache. RW token is only used on push to the default
# branch; everything else (PRs, feature branches) gets the read-only token.
env:
  NX_SELF_HOSTED_REMOTE_CACHE_SERVER: ${{ secrets.NX_CACHE_SERVER }}
  NX_SELF_HOSTED_REMOTE_CACHE_ACCESS_TOKEN: ${{ (github.event_name == 'push' && github.ref_name == github.event.repository.default_branch) && secrets.NX_CACHE_RW_TOKEN || secrets.NX_CACHE_RO_TOKEN }}

jobs:
  build:

    name: build
    runs-on: ubuntu-latest

    permissions:
      contents: read
      id-token: write
      packages: write
      attestations: write

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup node
      uses: actions/setup-node@v4
      with:
        node-version: 22

    - name: Install dependencies
      run: npm ci

    - name: Build
      timeout-minutes: 15
      run: npx nx build --configuration=production

    - name: Test
      run: npx nx affected --target=test --watch=false --parallel=true

    # Hand dist/ off to the publish-* matrix jobs. The snippets package
    # publishes from libs/ (source, not dist/) so each matrix job also runs
    # checkout — no need to bundle the snippets dir into this artifact.
    - name: Upload dist artifact
      uses: actions/upload-artifact@v4
      with:
        name: dist
        path: dist/
        retention-days: 1

    - name: Publish to Visual Studio Marketplace
      # uses: MintPlayer/publish-vscode-extension@v4.0.3
      uses: HaaLeo/publish-vscode-extension@v1.5.0
      with:
        packagePath: 'libs/mintplayer-ng-bootstrap-snippets'
        pat: ${{ secrets.PUBLISH_SNIPPETS }}
        skipDuplicate: true
        registryUrl: https://marketplace.visualstudio.com

    # Publish to GitHub Container Registry
    - name: Authenticate with GHCR
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ github.token }}

    - name: Extract tags/labels
      id: meta-ghcr
      uses: docker/metadata-action@v5
      with:
        github-token: ${{ github.token }}
        images: ghcr.io/${{ github.repository }}

    - name: Publish to Github Container Registry
      id: push-ghcr
      uses: docker/build-push-action@v6
      with:
        context: .
        file: ./Dockerfile
        push: true
        tags: ${{ steps.meta-ghcr.outputs.tags }}
        labels: ${{ steps.meta-ghcr.outputs.labels }}

    - name: Generate artifact attestation
      uses: actions/attest-build-provenance@v1
      with:
        subject-name: ghcr.io/${{ github.repository }}
        subject-digest: ${{ steps.push-ghcr.outputs.digest }}
        push-to-registry: true

    # ---- React demo image ----

    - name: Extract React demo image tags/labels
      id: meta-react-demo
      uses: docker/metadata-action@v5
      with:
        github-token: ${{ github.token }}
        images: ghcr.io/${{ github.repository }}-react-demo

    - name: Publish React demo to Github Container Registry
      id: push-react-demo
      uses: docker/build-push-action@v6
      with:
        context: .
        file: ./apps/react-bootstrap-demo/Dockerfile
        push: true
        tags: ${{ steps.meta-react-demo.outputs.tags }}
        labels: ${{ steps.meta-react-demo.outputs.labels }}

    - name: Generate React demo artifact attestation
      uses: actions/attest-build-provenance@v1
      with:
        subject-name: ghcr.io/${{ github.repository }}-react-demo
        subject-digest: ${{ steps.push-react-demo.outputs.digest }}
        push-to-registry: true

    # ---- Vue demo image ----

    - name: Extract Vue demo image tags/labels
      id: meta-vue-demo
      uses: docker/metadata-action@v5
      with:
        github-token: ${{ github.token }}
        images: ghcr.io/${{ github.repository }}-vue-demo

    - name: Publish Vue demo to Github Container Registry
      id: push-vue-demo
      uses: docker/build-push-action@v6
      with:
        context: .
        file: ./apps/vue-bootstrap-demo/Dockerfile
        push: true
        tags: ${{ steps.meta-vue-demo.outputs.tags }}
        labels: ${{ steps.meta-vue-demo.outputs.labels }}

    - name: Generate Vue demo artifact attestation
      uses: actions/attest-build-provenance@v1
      with:
        subject-name: ghcr.io/${{ github.repository }}-vue-demo
        subject-digest: ${{ steps.push-vue-demo.outputs.digest }}
        push-to-registry: true

    # ---- ASP.NET Core API ----

    - name: Setup .NET 10
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'

    - name: Build API
      run: dotnet build apps/api/Api.csproj -c Release

    - name: Test API
      run: dotnet test apps/api/Tests/Api.Tests.csproj -c Release

    - name: Extract API image tags/labels
      id: meta-api
      uses: docker/metadata-action@v5
      with:
        github-token: ${{ github.token }}
        images: ghcr.io/${{ github.repository }}-api

    - name: Publish API to Github Container Registry
      id: push-api
      uses: docker/build-push-action@v6
      with:
        context: .
        file: ./apps/api/Dockerfile
        push: true
        tags: ${{ steps.meta-api.outputs.tags }}
        labels: ${{ steps.meta-api.outputs.labels }}

    - name: Generate API artifact attestation
      uses: actions/attest-build-provenance@v1
      with:
        subject-name: ghcr.io/${{ github.repository }}-api
        subject-digest: ${{ steps.push-api.outputs.digest }}
        push-to-registry: true

  # ----------------------------------------------------------------------
  # NPM publishing
  #
  # web-components is the framework-agnostic core; the wrappers (react /
  # vue / ng-bootstrap) declare a peer dep on it, so we publish the core
  # set first and only then the wrappers — that way `npm install
  # @mintplayer/react-bootstrap` can resolve the peer at install time
  # right after a release goes out.
  #
  # ng-bootstrap-snippets is unusual: it publishes from libs/ (source,
  # not dist/) and only goes to NPM, never to GitHub Packages.
  # ----------------------------------------------------------------------

  publish-npm-core:
    name: publish-npm-core (${{ matrix.pkg.name }})
    needs: build
    runs-on: ubuntu-latest

    permissions:
      contents: read
      id-token: write

    strategy:
      fail-fast: false
      max-parallel: 5
      matrix:
        pkg:
          - { name: web-components,        path: dist/libs/mintplayer-web-components/package.json }
          - { name: ng-animations,         path: dist/libs/mintplayer-ng-animations/package.json }
          - { name: ng-click-outside,      path: dist/libs/mintplayer-ng-click-outside/package.json }
          - { name: ng-focus-on-load,      path: dist/libs/mintplayer-ng-focus-on-load/package.json }
          - { name: encode-utf8,           path: dist/libs/mintplayer-encode-utf8/package.json }
          - { name: dijkstra,              path: dist/libs/mintplayer-dijkstra/package.json }
          - { name: qr-code,               path: dist/libs/mintplayer-qr-code/package.json }
          - { name: pagination,            path: dist/libs/mintplayer-pagination/package.json }
          - { name: ng-qr-code,            path: dist/libs/mintplayer-ng-qr-code/package.json }
          - { name: ng-swiper,             path: dist/libs/mintplayer-ng-swiper/package.json }
          - { name: ng-bootstrap-snippets, path: libs/mintplayer-ng-bootstrap-snippets/package.json }

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download dist artifact
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist

      - name: Push to NPM
        uses: ./.github/actions/publish-npm-package
        with:
          package: ${{ matrix.pkg.path }}
          registry: 'https://registry.npmjs.org'
          token: ${{ secrets.PUBLISH_TO_NPMJS }}

  publish-npm-wrappers:
    name: publish-npm-wrappers (${{ matrix.pkg.name }})
    needs: publish-npm-core
    runs-on: ubuntu-latest

    permissions:
      contents: read
      id-token: write

    strategy:
      fail-fast: false
      matrix:
        pkg:
          - { name: react-bootstrap, path: dist/libs/mintplayer-react-bootstrap/package.json }
          - { name: vue-bootstrap,   path: dist/libs/mintplayer-vue-bootstrap/package.json }
          - { name: ng-bootstrap,    path: dist/libs/mintplayer-ng-bootstrap/package.json }

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download dist artifact
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist

      - name: Push to NPM
        uses: ./.github/actions/publish-npm-package
        with:
          package: ${{ matrix.pkg.path }}
          registry: 'https://registry.npmjs.org'
          token: ${{ secrets.PUBLISH_TO_NPMJS }}

  publish-ghpkg-core:
    name: publish-ghpkg-core (${{ matrix.pkg.name }})
    needs: build
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write
      id-token: write

    strategy:
      fail-fast: false
      max-parallel: 5
      matrix:
        pkg:
          - { name: web-components,   path: dist/libs/mintplayer-web-components/package.json }
          - { name: ng-animations,    path: dist/libs/mintplayer-ng-animations/package.json }
          - { name: ng-click-outside, path: dist/libs/mintplayer-ng-click-outside/package.json }
          - { name: ng-focus-on-load, path: dist/libs/mintplayer-ng-focus-on-load/package.json }
          - { name: encode-utf8,      path: dist/libs/mintplayer-encode-utf8/package.json }
          - { name: dijkstra,         path: dist/libs/mintplayer-dijkstra/package.json }
          - { name: qr-code,          path: dist/libs/mintplayer-qr-code/package.json }
          - { name: pagination,       path: dist/libs/mintplayer-pagination/package.json }
          - { name: ng-qr-code,       path: dist/libs/mintplayer-ng-qr-code/package.json }
          - { name: ng-swiper,        path: dist/libs/mintplayer-ng-swiper/package.json }

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download dist artifact
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist

      - name: Push to Github
        uses: ./.github/actions/publish-npm-package
        with:
          package: ${{ matrix.pkg.path }}
          registry: 'https://npm.pkg.github.com'
          token: ${{ github.token }}

  publish-ghpkg-wrappers:
    name: publish-ghpkg-wrappers (${{ matrix.pkg.name }})
    needs: publish-ghpkg-core
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write
      id-token: write

    strategy:
      fail-fast: false
      matrix:
        pkg:
          - { name: react-bootstrap, path: dist/libs/mintplayer-react-bootstrap/package.json }
          - { name: vue-bootstrap,   path: dist/libs/mintplayer-vue-bootstrap/package.json }
          - { name: ng-bootstrap,    path: dist/libs/mintplayer-ng-bootstrap/package.json }

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download dist artifact
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist

      - name: Push to Github
        uses: ./.github/actions/publish-npm-package
        with:
          package: ${{ matrix.pkg.path }}
          registry: 'https://npm.pkg.github.com'
          token: ${{ github.token }}

  deploy:
    runs-on: ubuntu-latest
    needs: [build, publish-npm-core, publish-npm-wrappers, publish-ghpkg-core, publish-ghpkg-wrappers]
    if: github.ref == 'refs/heads/master'

    permissions:
      contents: read
      packages: read

    steps:
      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.0.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          passphrase: ${{ secrets.VPS_SSH_KEY_PASSPHRASE }}
          envs: GITHUB_TOKEN
          script: |
            mkdir -p /var/www/ng-bootstrap
            cd /var/www/ng-bootstrap

            # Generate .env from GitHub Secrets (ready for future secrets)
            cat > .env << EOF
            # Future secrets go here, e.g.:
            # SECRET_KEY=value
            EOF

            # Download latest docker-compose.yml from the repository
            rm -f docker-compose.yml
            curl -sf -H "Authorization: token $GITHUB_TOKEN" -o docker-compose.yml https://raw.githubusercontent.com/${{ github.repository }}/master/docker-compose.yml

            # Log in to GHCR using the workflow's GITHUB_TOKEN
            echo "$GITHUB_TOKEN" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

            # Pull latest image
            docker compose --env-file .env pull

            # Stop and remove old containers (including any orphans from prior service renames)
            docker compose --env-file .env down --remove-orphans

            # Start new containers
            docker compose --env-file .env up -d --remove-orphans

            # Clean up old images
            docker image prune -f
