name: publish-master

on:
  push:
    branches: [ master ]

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

# Self-hosted Nx remote cache. RW token is only used on push to the default
# branch; everything else (PRs, feature branches) gets the read-only token.
env:
  NX_SELF_HOSTED_REMOTE_CACHE_SERVER: ${{ secrets.NX_CACHE_SERVER }}
  NX_SELF_HOSTED_REMOTE_CACHE_ACCESS_TOKEN: ${{ (github.event_name == 'push' && github.ref_name == github.event.repository.default_branch) && secrets.NX_CACHE_RW_TOKEN || secrets.NX_CACHE_RO_TOKEN }}

jobs:
  build:
  
    name: publish-master
    runs-on: ubuntu-latest
    
    permissions: 
      contents: read
      id-token: write
      packages: write
      attestations: write
    
    steps:
    - name: Checkout
      uses: actions/checkout@v6
    
    - name: Setup node
      uses: actions/setup-node@v6
      with:
        node-version: 24

    - name: Install dependencies
      run: npm ci
    
    - name: Build
      timeout-minutes: 15
      # run-many so EVERY publishable lib lands in dist/libs/ for the
      # discovery action. Plain `nx build` only builds the default
      # project (ng-bootstrap-demo) and its transitive deps — react-
      # and vue-bootstrap aren't reachable from there, so they were
      # silently absent from the publish plan on the first PR-4 deploy.
      run: npx nx run-many --target=build --configuration=production

    - name: Test
      run: npx nx affected --target=test --watch=false --parallel=true

    # Hand dist/ off to the publish-libs / publish-snippets jobs. The
    # snippets package publishes from libs/ (source, not dist/) so the
    # snippets job checks the repo out separately — no need to bundle
    # that dir into this artifact.
    - name: Upload dist artifact
      uses: actions/upload-artifact@v7
      with:
        name: dist
        path: dist/
        retention-days: 1

    - name: Publish to Visual Studio Marketplace
      # uses: MintPlayer/publish-vscode-extension@v4.0.3
      uses: HaaLeo/publish-vscode-extension@v2
      with:
        packagePath: 'libs/mintplayer-ng-bootstrap-snippets'
        pat: ${{ secrets.PUBLISH_SNIPPETS }}
        skipDuplicate: true
        registryUrl: https://marketplace.visualstudio.com

    # Publish to GitHub Container Registry
    - name: Authenticate with GHCR
      uses: docker/login-action@v4
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ github.token }}

    - name: Extract tags/labels
      id: meta-ghcr
      uses: docker/metadata-action@v6
      with:
        github-token: ${{ github.token }}
        images: ghcr.io/${{ github.repository }}
    
    - name: Publish to Github Container Registry
      id: push-ghcr
      uses: docker/build-push-action@v7
      with:
        context: .
        file: ./apps/ng-bootstrap-demo/Dockerfile
        push: true
        tags: ${{ steps.meta-ghcr.outputs.tags }}
        labels: ${{ steps.meta-ghcr.outputs.labels }}

    - name: Generate artifact attestation
      uses: actions/attest-build-provenance@v4
      with:
        subject-name: ghcr.io/${{ github.repository }}
        subject-digest: ${{ steps.push-ghcr.outputs.digest }}
        push-to-registry: true

    # ---- React demo image ----

    - name: Extract React demo image tags/labels
      id: meta-react-demo
      uses: docker/metadata-action@v6
      with:
        github-token: ${{ github.token }}
        images: ghcr.io/${{ github.repository }}-react-demo

    - name: Publish React demo to Github Container Registry
      id: push-react-demo
      uses: docker/build-push-action@v7
      with:
        context: .
        file: ./apps/react-bootstrap-demo/Dockerfile
        push: true
        tags: ${{ steps.meta-react-demo.outputs.tags }}
        labels: ${{ steps.meta-react-demo.outputs.labels }}

    - name: Generate React demo artifact attestation
      uses: actions/attest-build-provenance@v4
      with:
        subject-name: ghcr.io/${{ github.repository }}-react-demo
        subject-digest: ${{ steps.push-react-demo.outputs.digest }}
        push-to-registry: true

    # ---- Vue demo image ----

    - name: Extract Vue demo image tags/labels
      id: meta-vue-demo
      uses: docker/metadata-action@v6
      with:
        github-token: ${{ github.token }}
        images: ghcr.io/${{ github.repository }}-vue-demo

    - name: Publish Vue demo to Github Container Registry
      id: push-vue-demo
      uses: docker/build-push-action@v7
      with:
        context: .
        file: ./apps/vue-bootstrap-demo/Dockerfile
        push: true
        tags: ${{ steps.meta-vue-demo.outputs.tags }}
        labels: ${{ steps.meta-vue-demo.outputs.labels }}

    - name: Generate Vue demo artifact attestation
      uses: actions/attest-build-provenance@v4
      with:
        subject-name: ghcr.io/${{ github.repository }}-vue-demo
        subject-digest: ${{ steps.push-vue-demo.outputs.digest }}
        push-to-registry: true

    # ---- ASP.NET Core API ----

    - name: Setup .NET 10
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: '10.0.x'

    - name: Build API
      run: dotnet build apps/api/Api.csproj -c Release

    - name: Test API
      run: dotnet test apps/api/Tests/Api.Tests.csproj -c Release

    - name: Extract API image tags/labels
      id: meta-api
      uses: docker/metadata-action@v6
      with:
        github-token: ${{ github.token }}
        images: ghcr.io/${{ github.repository }}-api

    - name: Publish API to Github Container Registry
      id: push-api
      uses: docker/build-push-action@v7
      with:
        context: .
        file: ./apps/api/Dockerfile
        push: true
        tags: ${{ steps.meta-api.outputs.tags }}
        labels: ${{ steps.meta-api.outputs.labels }}

    - name: Generate API artifact attestation
      uses: actions/attest-build-provenance@v4
      with:
        subject-name: ghcr.io/${{ github.repository }}-api
        subject-digest: ${{ steps.push-api.outputs.digest }}
        push-to-registry: true

    # GHCR packages default to private on first publish. The 'ng-bootstrap'
    # image was already flipped to public manually long ago, but the three
    # new images (react-demo, vue-demo, api) start private — VPS docker
    # compose pull then fails with 'denied'. Flip each one to public via
    # the org-packages API. PATCH is idempotent: already-public packages
    # return 204 No Content; we swallow any 403/404 so a misconfigured
    # token doesn't fail the whole workflow.
    - name: Make GHCR images public
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        for pkg in \
            mintplayer-ng-bootstrap \
            mintplayer-ng-bootstrap-react-demo \
            mintplayer-ng-bootstrap-vue-demo \
            mintplayer-ng-bootstrap-api; do
          echo "→ $pkg"
          gh api --method PATCH \
            "/orgs/${{ github.repository_owner }}/packages/container/$pkg" \
            -f visibility=public 2>&1 || echo "  (skipped — already public, missing, or insufficient scope)"
        done

  # ----------------------------------------------------------------------
  # NPM publishing
  #
  # MintPlayer/github-actions/publish-npm-packages scans the given folder,
  # topo-sorts the discovered libs by peerDependencies, and fans out to
  # every registry it's given. Replaces what previously needed 18 hand-
  # listed JS-DevTools/npm-publish steps (9 libs × 2 registries) plus the
  # snippets publish.
  #
  # ng-bootstrap-snippets is unusual: it publishes from libs/ (source,
  # not dist/) and only goes to NPM, never to GitHub Packages — so it
  # gets its own action invocation with a different `folder` root.
  # ----------------------------------------------------------------------

  publish-libs:
    name: publish-libs
    needs: build
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Download dist artifact
        uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist

      - name: Publish to NPM + GitHub Packages
        # Pinned to b08fbdd (v1.1.0) — the v1.1.0 tag isn't pushed yet on
        # MintPlayer/github-actions. Promote to @v1 once that tag lands.
        uses: MintPlayer/github-actions/publish-npm-packages@b08fbddf0b285a8633ac138b89d79ceb8cc8c888
        with:
          folder: dist/libs
          registries: |
            [
              { "url": "https://registry.npmjs.org", "token": "${{ secrets.PUBLISH_TO_NPMJS }}" },
              { "url": "https://npm.pkg.github.com", "token": "${{ github.token }}" }
            ]

  publish-snippets:
    name: publish-snippets
    needs: build
    runs-on: ubuntu-latest

    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Publish snippets to NPM
        uses: MintPlayer/github-actions/publish-npm-packages@b08fbddf0b285a8633ac138b89d79ceb8cc8c888
        with:
          folder: libs/mintplayer-ng-bootstrap-snippets
          registries: |
            [
              { "url": "https://registry.npmjs.org", "token": "${{ secrets.PUBLISH_TO_NPMJS }}" }
            ]

  deploy:
    runs-on: ubuntu-latest
    needs: [build, publish-libs, publish-snippets]
    if: github.ref == 'refs/heads/master'

    permissions:
      contents: read
      packages: read

    steps:
      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.2.5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          passphrase: ${{ secrets.VPS_SSH_KEY_PASSPHRASE }}
          envs: GITHUB_TOKEN
          script: |
            mkdir -p /var/www/ng-bootstrap
            cd /var/www/ng-bootstrap

            # Generate .env from GitHub Secrets (ready for future secrets)
            cat > .env << EOF
            # Future secrets go here, e.g.:
            # SECRET_KEY=value
            EOF

            # Download latest docker-compose.yml from the repository
            rm -f docker-compose.yml
            curl -sf -H "Authorization: token $GITHUB_TOKEN" -o docker-compose.yml https://raw.githubusercontent.com/${{ github.repository }}/master/docker-compose.yml

            # Log in to GHCR using the workflow's GITHUB_TOKEN
            echo "$GITHUB_TOKEN" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

            # Pull latest image
            docker compose --env-file .env pull

            # Stop and remove old containers (including any orphans from prior service renames)
            docker compose --env-file .env down --remove-orphans

            # Start new containers
            docker compose --env-file .env up -d --remove-orphans

            # Clean up old images
            docker image prune -f
