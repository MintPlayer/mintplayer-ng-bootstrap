    - name: Push to Github
      uses: JS-DevTools/npm-publish@v4
      with:
        package: 'dist/libs/mintplayer-ng-bootstrap/package.json'
        registry: 'https://npm.pkg.github.com'
        token: ${{ github.token }}
        access: 'public'
        provenance: true
        
    - name: Push to NPM
      uses: JS-DevTools/npm-publish@v4
      with:
        package: 'libs/mintplayer-ng-bootstrap-snippets/package.json'
        registry: 'https://registry.npmjs.org'
        token: ${{ secrets.PUBLISH_TO_NPMJS }}
        access: 'public'
        provenance: true

    - name: Publish to Visual Studio Marketplace
      # uses: MintPlayer/publish-vscode-extension@v4.0.3
      uses: HaaLeo/publish-vscode-extension@v1.5.0
      with:
        packagePath: 'libs/mintplayer-ng-bootstrap-snippets'
        pat: ${{ secrets.PUBLISH_SNIPPETS }}
        skipDuplicate: true
        registryUrl: https://marketplace.visualstudio.com

    # Publish to GitHub Container Registry
    - name: Authenticate with GHCR
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ github.token }}

    - name: Extract tags/labels
      id: meta-ghcr
      uses: docker/metadata-action@v5
      with:
        github-token: ${{ github.token }}
        images: ghcr.io/${{ github.repository }}
    
    - name: Publish to Github Container Registry
      id: push-ghcr
      uses: docker/build-push-action@v6
      with:
        context: .
        file: ./Dockerfile
        push: true
        tags: ${{ steps.meta-ghcr.outputs.tags }}
        labels: ${{ steps.meta-ghcr.outputs.labels }}

    - name: Generate artifact attestation
      uses: actions/attest-build-provenance@v1
      with:
        subject-name: ghcr.io/${{ github.repository }}
        subject-digest: ${{ steps.push-ghcr.outputs.digest }}
        push-to-registry: true
  
    # - name: Publish through FTP
    #   uses: SamKirkland/FTP-Deploy-Action@v4.3.4
    #   if: ${{ steps.publish_ng_bootstrap.outputs.type }}
    #   with:
    #     server: mintplayer.com
    #     username: ${{ secrets.PUBLISH_FTP_USER }}
    #     password: ${{ secrets.PUBLISH_FTP_PWD }}
    #     local-dir: ./dist/apps/ng-bootstrap-demo/browser/
    #     server-dir: ./

  deploy:
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/master'

    permissions:
      contents: read
      packages: read

    steps:
      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.0.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          passphrase: ${{ secrets.VPS_SSH_KEY_PASSPHRASE }}
          envs: GITHUB_TOKEN
          script: |
            mkdir -p /var/www/ng-bootstrap
            cd /var/www/ng-bootstrap

            # Generate .env from GitHub Secrets (ready for future secrets)
            cat > .env << EOF
            # Future secrets go here, e.g.:
            # SECRET_KEY=value
            EOF

            # Download latest docker-compose.yml from the repository
            rm -f docker-compose.yml
            curl -sf -H "Authorization: token $GITHUB_TOKEN" -o docker-compose.yml https://raw.githubusercontent.com/${{ github.repository }}/master/docker-compose.yml

            # Log in to GHCR using the workflow's GITHUB_TOKEN
            echo "$GITHUB_TOKEN" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

            # Pull latest image
            docker compose --env-file .env pull

            # Stop and remove old containers
            docker compose --env-file .env down

            # Start new containers
            docker compose --env-file .env up -d

            # Clean up old images
            docker image prune -f
