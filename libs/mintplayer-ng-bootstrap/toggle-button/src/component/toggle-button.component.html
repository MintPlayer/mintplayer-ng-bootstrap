<label [class]="mainCheckStyle()" [class.form-switch]="isSwitch()">
    <input #checkbox
        [class]="inputClass()"
        [type]="checkOrRadio()"
        [name]="nameResult()"
        [value]="value()"
        [checked]="!!isToggled()"
        [attr.role]="ariaRole()"
        [attr.aria-pressed]="ariaPressed()"
        (change)="onInputChange($event)">
    <span [class]="labelClass()">
        <ng-content></ng-content>
    </span>
</label>
