<div class="carousel slide">
    <div class="carousel-indicators">
        <button *ngFor="let slide of slides; let i = index" type="button" (click)="setcurrentSlide(i)" data-bs-target
            [class.active]="(currentSlideIndex$ | async) === i"
            [attr.aria-current]="(currentSlideIndex$ | async) === i ? true : null"
            [attr.aria-label]="'Slide ' + i"></button>
    </div>
    <div class="carousel-inner" [@carouselSlide]="currentSlideCounter$ | async">
        <ng-container *ngFor="let slide of slides; let i = index">
            <!-- @fadeInOut -->
            <div class="carousel-item" [class.active]="(currentSlideIndex$ | async) === i" *ngIf="(currentSlideIndex$ | async) === i">
                <ng-container *ngTemplateOutlet="slide.template"></ng-container>
            </div>
        </ng-container>
    </div>
    <button class="carousel-control-prev" type="button" (click)="previousSlide()">
        <span class="carousel-control-prev-icon" aria-hidden="true"></span>
        <span class="visually-hidden">Previous</span>
    </button>
    <button class="carousel-control-next" type="button" (click)="nextSlide()">
        <span class="carousel-control-next-icon" aria-hidden="true"></span>
        <span class="visually-hidden">Next</span>
    </button>
</div>
