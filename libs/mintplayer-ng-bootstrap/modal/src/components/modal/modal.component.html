@if (isOpen()) {
    <div class="modal d-block"
        [@fadeInOut]
        [@enterFromTop]
        role="dialog"
        aria-modal="true"
        [attr.aria-labelledby]="context.headerId()"
        [attr.aria-describedby]="context.bodyId()"
        [bsOverlayFocus]="true"
        tabindex="-1">
        <div class="modal-dialog" [class.modal-dialog-scrollable]="scrollable()">
            <div class="modal-content">
                <ng-container *ngTemplateOutlet="template; injector: injector"></ng-container>
            </div>
        </div>
    </div>

    <div [@fadeInOut]>
        <div class="modal-backdrop fade" [class.show]="isOpen()" aria-hidden="true"></div>
    </div>
}
