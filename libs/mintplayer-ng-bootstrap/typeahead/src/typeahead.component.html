<bs-has-overlay></bs-has-overlay>
<bs-form>
    <div bsDropdown popupRole="listbox" [(isOpen)]="isOpen" [hasBackdrop]="false" [sameDropdownWidth]="true">
        <input type="text"
            #textbox
            [ngModel]="searchterm()"
            (ngModelChange)="onProvideSuggestions($event)"
            bsCombobox
            (activate)="onActivate()"
            (cancel)="onCancel()"
            (keyup.enter)="onSubmit()"
            autocomplete="off" />
        <bs-dropdown-menu *bsDropdownMenu bsRovingFocus mode="activedescendant">
            @if (isLoading()) {
                <bs-progress [height]="2" [isIndeterminate]="true"></bs-progress>
                <bs-dropdown-item [disabled]="true">
                    {{ isLoadingText() }}
                </bs-dropdown-item>
            }
            @if (!isLoading()) {
                @if (showNoSuggestions()) {
                    <bs-dropdown-item [disabled]="true">
                        {{ noSuggestionsText() }}
                    </bs-dropdown-item>
                }
                @for (suggestion of suggestions(); track suggestion) {
                    <bs-dropdown-item bsRovingFocusItem (click)="suggestionClicked(suggestion)">
                        {{ suggestion.text }}
                    </bs-dropdown-item>
                }
            }
        </bs-dropdown-menu>
    </div>
</bs-form>
