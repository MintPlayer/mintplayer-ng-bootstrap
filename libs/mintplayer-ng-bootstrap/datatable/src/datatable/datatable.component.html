<mp-datatable
  #datatable
  class="bs-datatable"
  (mp-datatable-sort-change)="onSortChange($event)"
  (mp-datatable-selection-change)="onSelectionChange($event)"
  (mp-datatable-page-change)="onPageChange($event)"
  (mp-datatable-row-click)="onRowClick($event)"
  (mp-datatable-row-dblclick)="onRowDblClick($event)"
  (mp-datatable-row-contextmenu)="onRowContextMenu($event)"
></mp-datatable>
