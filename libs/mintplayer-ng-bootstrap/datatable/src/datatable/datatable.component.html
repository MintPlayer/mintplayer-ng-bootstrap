<bs-table [isResponsive]="true" [striped]="true" [hover]="true" class="mb-3">
    <thead>
        <tr>
            @for (column of columnsArray; track column) {
                <th class="text-nowrap"
                    [class.sort]="column.sortable"
                    [class.sort-asc]="column.sortable && getSortDirection(column.name) === 'ascending'"
                    [class.sort-desc]="column.sortable && getSortDirection(column.name) === 'descending'"
                    (mousedown)="onHeaderMouseDown($event)"
                    (click)="columnHeaderClicked(column, $event)">
                    <ng-container *ngTemplateOutlet="column.templateRef"></ng-container>
                    @if (settings().sortColumns.length > 1 && getSortIndex(column.name) >= 0) {
                        <span class="sort-priority">{{ getSortIndex(column.name) + 1 }}</span>
                    }
                </th>
            }
        </tr>
    </thead>
    <tbody>
        @if (!!data() && !!rowTemplate) {
            @for (item of data()!.data; track $index) {
                <ng-container *ngTemplateOutlet="rowTemplate; context: { $implicit: item }"></ng-container>
            }
        }
    </tbody>
    <tfoot>
        <tr>
            <td [colSpan]="numberOfColumns()">
                <bs-grid [stopFullWidthAt]="'never'">
                    <div bsRow>
                        <div [md]="12">
                            <bs-pagination class="float-start" [pageNumbers]="settings().perPage.values"
                                [selectedPageNumber]="settings().perPage.selected" (selectedPageNumberChange)="onPerPageChange($event)"
                                [showArrows]="false"></bs-pagination>
                            <bs-pagination class="float-end" [pageNumbers]="settings().page.values"
                                [selectedPageNumber]="settings().page.selected" (selectedPageNumberChange)="onPageChange($event)"
                                [showArrows]="true" [numberOfBoxes]="settings().pageNumberOfBoxes"></bs-pagination>
                        </div>
                    </div>
                </bs-grid>
            </td>
        </tr>
    </tfoot>
</bs-table>
