<nav [attr.aria-label]="ariaLabel()">
    <ul class="pagination">
        @if (showArrows()) {
            <li class="page-item">
                <a class="page-link" href="" (click)="onPrevious()" [class.disabled]="isFirstPage()" aria-label="Previous">
                    <span aria-hidden="true">&laquo;</span>
                    <span class="visually-hidden">Previous</span>
                </a>
            </li>
        }
        @for (pageNumber of shownPageNumbers(); track $index) {
            <li class="page-item" [class.active]="pageNumber.selected">
                @if (pageNumber.page === '...') {
                    <span class="page-link disabled" aria-disabled="true">
                        <span aria-hidden="true">&hellip;</span>
                        <span class="visually-hidden">More pages</span>
                    </span>
                } @else {
                    <a class="page-link" href="" (click)="onSelectPage($event, pageNumber.page)" [class.active]="pageNumber.selected" [attr.aria-current]="pageNumber.selected ? 'page' : null">
                        {{ pageNumber.page }}
                    </a>
                }
            </li>
        }
        @if (showArrows()) {
            <li class="page-item">
                <a class="page-link" href="" (click)="onNext()" [class.disabled]="isLastPage()" aria-label="Next">
                    <span aria-hidden="true">&raquo;</span>
                    <span class="visually-hidden">Next</span>
                </a>
            </li>
        }
    </ul>
</nav>
