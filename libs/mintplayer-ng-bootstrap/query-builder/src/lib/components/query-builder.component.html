<mp-query-builder
  #wc
  [attr.disabled]="effectiveDisabled() ? '' : null"
  (query-change)="onQueryChange($event)"
  (root-entity-change)="onRootEntityChange($event)"
  (selected-fields-change)="onSelectedFieldsChange($event)"
  (sort-by-change)="onSortByChange($event)"
  (save-query)="onSaveQuery($event)"
  (load-query)="onLoadQuery($event)"
  (delete-query)="onDeleteQuery($event)"
></mp-query-builder>
