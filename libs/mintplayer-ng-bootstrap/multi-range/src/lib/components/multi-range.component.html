<mp-multi-range
  #el
  class="bs-multi-range"
  [attr.min]="min()"
  [attr.max]="max()"
  [attr.step]="step()"
  [attr.min-distance]="minDistance()"
  [attr.orientation]="orientation()"
  [attr.disabled]="disabledAttr()"
  [attr.aria-label]="label()"
  (value-input)="onValueInput($event)"
  (value-change)="onValueChange($event)"
></mp-multi-range>
