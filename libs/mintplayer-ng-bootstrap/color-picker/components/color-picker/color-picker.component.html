@let letDisabled = disabled();
@let letHS = hs();
@let letBrightness = brightness();
@let letAlpha = alpha();

<bs-color-wheel [disabled]="letDisabled" [hs]="letHS" (hsChange)="onUserHsChange($event)" [brightness]="letBrightness" [width]="size()" [height]="size()" #wheel></bs-color-wheel>
<bs-brightness-strip [disabled]="letDisabled" [hs]="letHS" [brightness]="letBrightness" (brightnessChange)="onUserBrightnessChange($event)" class="d-block mt-2" [style.width.px]="size()" #strip></bs-brightness-strip>
@if (allowAlpha()) {
    <bs-alpha-strip [disabled]="letDisabled" [hs]="letHS" [brightness]="letBrightness" [alpha]="letAlpha" (alphaChange)="onUserAlphaChange($event)" class="d-block mt-2" [style.width.px]="size()" #alphaStrip></bs-alpha-strip>
}
@if (showAccessibilityToggle()) {
    <div class="form-check mt-2" [style.width.px]="size()">
        <input type="checkbox" class="form-check-input" [id]="toggleId" [checked]="channelSlidersVisible()" (change)="onChannelSlidersToggle($event)">
        <label class="form-check-label" [attr.for]="toggleId">Show hue + saturation sliders</label>
    </div>
    @if (channelSlidersVisible()) {
        <bs-hue-strip [disabled]="letDisabled" [hs]="letHS" (hsChange)="onUserHsChange($event)" class="d-block mt-2" [style.width.px]="size()"></bs-hue-strip>
        <bs-saturation-strip [disabled]="letDisabled" [hs]="letHS" (hsChange)="onUserHsChange($event)" class="d-block mt-2" [style.width.px]="size()"></bs-saturation-strip>
    }
}
