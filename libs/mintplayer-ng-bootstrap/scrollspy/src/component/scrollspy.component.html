<nav class="spy" aria-label="Section navigation">
    <ul class="text-muted">
        @for (dir of directives(); track dir; let i = $index) {
            <li>
                <button type="button"
                        [attr.data-index]="i"
                        class="btn btn-link cursor-pointer p-0 text-start text-decoration-none"
                        [class]="'nav' + dir.element.nativeElement.tagName"
                        [class.fw-bold]="activeDirective()?.element === dir.element"
                        [attr.aria-current]="activeDirective()?.element === dir.element ? 'location' : null"
                        (click)="scrollToHeader(dir)"
                        [title]="dir.element.nativeElement.textContent"
                        #anchor>
                    {{ dir.element.nativeElement.textContent }}
                </button>
            </li>
        }
    </ul>
</nav>
<div class="content">
    <ng-content></ng-content>
</div>
