<mp-file-manager
  #fileManager
  class="bs-file-manager"
  (mp-navigate)="onNavigate($event)"
  (mp-node-open)="onNodeOpen($event)"
  (mp-selection-change)="onSelectionChange($event)"
  (mp-upload-request)="onUploadRequest($event)"
  (mp-operation)="onOperation($event)"
  (mp-error)="onErrorReported($event)"
  (mp-children-loaded)="onChildrenLoaded($event)"
></mp-file-manager>
