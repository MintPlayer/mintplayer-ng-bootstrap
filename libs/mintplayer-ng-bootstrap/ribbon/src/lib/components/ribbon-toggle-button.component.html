<mp-ribbon-toggle-button
  [attr.item-id]="itemId()"
  [attr.label]="label()"
  [attr.icon]="icon()"
  [attr.size]="size()"
  [attr.disabled]="disabledState() ? '' : null"
  [attr.tooltip]="tooltip()"
  [attr.pressed]="pressed() ? '' : null"
  (toggle)="onToggle($event)"
>
  <ng-content></ng-content>
</mp-ribbon-toggle-button>
