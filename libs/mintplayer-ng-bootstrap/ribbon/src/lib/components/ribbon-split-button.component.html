<mp-ribbon-split-button
  [attr.item-id]="itemId()"
  [attr.label]="label()"
  [attr.icon]="icon()"
  [attr.size]="size()"
  [attr.disabled]="disabled() ? '' : null"
  [attr.tooltip]="tooltip()"
  (main-action)="onMainAction($event)"
  (menu-toggle)="onMenuToggle($event)"
>
  <ng-content></ng-content>
</mp-ribbon-split-button>
